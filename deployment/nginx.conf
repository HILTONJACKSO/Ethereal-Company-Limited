server {
    listen 80;
    server_name etherealcompanylimited.com www.etherealcompanylimited.com;

    # 1. Django API and Admin endpoints
    location ~ ^/(api|admin) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files (uncomment and adjust path if Django collects static files)
    # location /static/ {
    #     alias /var/www/ethera-website/backend/staticfiles/;
    # }

    # Django media files
    # location /media/ {
    #     alias /var/www/ethera-website/backend/media/;
    # }

    # 2. Next.js Frontend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
